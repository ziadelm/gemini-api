# .gitlab-ci.yml
image: python:3.12-slim

stages:
  - validate
  - test
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

cache:
  paths:
    - .cache/pip

before_script:
  - pip install --upgrade pip
  - pip install -r requirements.txt

# STAGE: VALIDATE
lint:
  stage: validate
  script:
    - pip install flake8
    - flake8 app/ --max-line-length=120 --exclude=__pycache__

format-check:
  stage: validate
  script:
    - pip install black
    - black --check app/

security-check:
  stage: validate
  script:
    - pip install bandit
    - bandit -r app/ -ll

secrets-check:
  stage: validate
  script:
    - pip install detect-secrets
    - detect-secrets scan --baseline .secrets.baseline || true

# STAGE: TEST
unit-test:
  stage: test
  script:
    - pytest tests/ -v

# STAGE: BUILD
build-docker:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main

# STAGE: RELEASE
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null'
      when: manual
  before_script: []
  script:
    - echo "Creating release v0.1.$CI_PIPELINE_IID"
  release:
    tag_name: 'v0.1.$CI_PIPELINE_IID'
    description: 'Release v0.1.$CI_PIPELINE_IID - Docker image available at https://gitlab.com/ziad.elm19/gemini-api/container_registry'